<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand-col">
        <div class="footer-brand">
          <svg class="footer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          <span>{{ site.title }}</span>
        </div>
        <p class="footer-desc">{{ site.description }}</p>
      </div>
      <div class="footer-links-col">
        <h4 class="footer-heading">Hızlı Bağlantılar</h4>
        <ul class="footer-links">
          <li><a href="{{ '/' | relative_url }}">Ana Sayfa</a></li>
          <li><a href="{{ '/' | relative_url }}#courses">Dersler</a></li>
          <li><a href="{{ '/tum-gonderiler' | relative_url }}">Tüm Gönderiler</a></li>
        </ul>
      </div>
      <div class="footer-courses-col">
        <h4 class="footer-heading">Dersler</h4>
        <ul class="footer-links">
          {% for course in site.data.courses %}
          <li><a href="{{ '/courses/' | append: course.id | relative_url }}">{{ course.name }}</a></li>
          {% endfor %}
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} | Tüm hakları saklıdır.</p>
    </div>
  </div>
</footer>
